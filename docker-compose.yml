services:
  database:
    image: postgres:latest
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: animals_area
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw

  webapi:
    build: .
    depends_on:
      - database
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: postgresql://postgres:pw@database:5432/animals_area?schema=animals_area
      JWT_SECRET: super-secret-key

  tests:
    image: mrexpen/planet_olymp_phase2
    pull_policy: always
    depends_on:
      - webapi
    ports:
      - '8090:8080'
    environment:
      SERVER_URL: http://webapi:8080
      STAGE: all