version: '3.9'

services:
  database:
    image: postgres:latest
    volumes:
      - /var/lib/postgresql
    environment:
      - POSTGRES_DB=animal-chipization
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password

  webapi:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgresql://user:password@database:5432/animal-chipization?schema=animals_area
      - JWT_SECRET=super-secret-key

  tests:
    image: mrexpen/planet_olymp_phase2
    pull_policy: always
    ports:
      - "8090:8080"
    depends_on:
      - webapi
    environment:
      SERVER_URL: http://webapi:8080
      STAGE: all